{% extends "base.html" %}

{% block title %}POS Terminal{% endblock %}

{% block content %}
<div class="row h-100">
    <!-- Left: Product Grid -->
    <div class="col-md-8 d-flex flex-column h-100">
        <div class="mb-3 d-flex gap-2">
            <input type="text" id="search-input" class="form-control" placeholder="Search products...">
            <select id="category-filter" class="form-select w-auto">
                <option value="">All Categories</option>
                <!-- Categories populated by JS -->
            </select>
        </div>

        <div id="product-grid" class="row row-cols-3 g-3 overflow-auto" style="max-height: 80vh;">
            <!-- Products populated by JS -->
            <div class="col text-center py-5">
                <div class="spinner-border"></div>
            </div>
        </div>
    </div>

    <!-- Right: Cart -->
    <div class="col-md-4 d-flex flex-column h-100 border-start bg-light p-3">
        <h4 class="d-flex justify-content-between align-items-center mb-3">
            <span>Current Sale</span>
        </h4>

        <!-- Customer Selection -->
        <div class="mb-3">
            <label class="form-label small text-muted">Customer</label>
            <select id="customer-select" class="form-select form-select-sm">
                <option value="">Walk-in Customer</option>
            </select>
        </div>

        <div id="cart-items" class="flex-grow-1 overflow-auto mb-3 border-top border-bottom bg-white p-2">
            <div class="text-center text-muted py-5">Cart is empty</div>
        </div>

        <div class="mt-auto">
            <div class="d-flex justify-content-between h5">
                <span>Total:</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button id="checkout-btn" class="btn btn-success w-100 btn-lg mt-3" disabled>
                Checkout
            </button>
        </div>
    </div>
</div>
<!-- Toast Container -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-header">
            <strong class="me-auto" id="toast-title">Notification</strong>
            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
        <div class="toast-body" id="toast-body">
            Action successful.
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let allProducts = [];
    let cart = []; // {id, name, price, quantity}
    let customers = [];

    document.addEventListener("DOMContentLoaded", async () => {
        await Promise.all([loadProducts(), loadCategories(), loadCustomers()]);
        renderProducts(allProducts);
    });

    // --- Data Loading ---
    async function loadProducts() {
        try {
            const res = await fetch('/inventory/api/items/');
            const data = await res.json();
            allProducts = Array.isArray(data) ? data : (data.results || []);
        } catch (e) {
            console.error("Error loading products:", e);
            document.getElementById('product-grid').innerHTML = '<div class="text-danger p-3">Failed to load products.</div>';
        }
    }

    async function loadCategories() {
        try {
            const res = await fetch('/inventory/api/categories/');
            const data = await res.json();
            const categories = Array.isArray(data) ? data : (data.results || []);
            const select = document.getElementById('category-filter');
            categories.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.innerText = c.name;
                select.appendChild(opt);
            });
        } catch (e) { console.error("Error loading categories:", e); }
    }

    async function loadCustomers() {
        try {
            const res = await fetch('/pos/api/customers/');
            const data = await res.json();
            customers = data.results || data; // Handle pagination if needed
            const select = document.getElementById('customer-select');
            customers.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.innerText = c.name;
                select.appendChild(opt);
            });
        } catch (e) { console.error("Error loading customers", e); }
    }

    // --- Rendering ---
    function renderProducts(products) {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = '';

        if (products.length === 0) {
            grid.innerHTML = '<div class="col-12 text-center text-muted py-5">No products found</div>';
            return;
        }

        products.forEach(p => {
            const col = document.createElement('div');
            col.className = 'col';
            const inStock = parseInt(p.quantity, 10) || 0;
            const outOfStock = inStock <= 0;
            const cardClass = outOfStock ? 'card h-100 shadow-sm product-card product-card--out' : 'card h-100 shadow-sm product-card';
            col.innerHTML = `
            <div class="${cardClass}" onclick="addToCart(${p.id})" data-product-id="${p.id}">
                <div class="card-body">
                    <h6 class="card-title text-truncate">${p.name}</h6>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                         <span class="badge bg-secondary">${p.sku || ''}</span>
                         <span class="fw-bold text-primary">$${parseFloat(p.retail_price).toFixed(2)}</span>
                    </div>
                    <div class="small mt-1 text-muted">In stock: ${inStock}</div>
                </div>
            </div>
        `;
            grid.appendChild(col);
        });
    }

    function renderCart() {
        const container = document.getElementById('cart-items');
        container.innerHTML = '';
        let total = 0;

        if (cart.length === 0) {
            container.innerHTML = '<div class="text-center text-muted py-5">Cart is empty</div>';
            document.getElementById('checkout-btn').disabled = true;
            document.getElementById('cart-total').innerText = '$0.00';
            return;
        }

        cart.forEach((item, index) => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;

            const el = document.createElement('div');
            el.className = 'd-flex justify-content-between align-items-center mb-2 p-2 border-bottom';
            el.innerHTML = `
            <div>
                <div class="fw-bold">${item.name}</div>
                <div class="small text-muted">$${parseFloat(item.price).toFixed(2)} x ${item.quantity}</div>
            </div>
            <div class="text-end">
                <div class="fw-bold">$${itemTotal.toFixed(2)}</div>
                <div class="btn-group btn-group-sm mt-1">
                     <button class="btn btn-outline-secondary" onclick="updateQty(${index}, -1)">-</button>
                     <button class="btn btn-outline-danger" onclick="removeFromCart(${index})">×</button>
                </div>
            </div>
        `;
            container.appendChild(el);
        });

        document.getElementById('cart-total').innerText = '$' + total.toFixed(2);
        document.getElementById('checkout-btn').disabled = false;
    }

    // --- Interaction ---
    window.addToCart = (id) => {
        const product = allProducts.find(p => p.id === id);
        if (!product) return;
        const available = parseInt(product.quantity, 10) || 0;
        if (available <= 0) {
            showToast('Out of stock', product.name + ' has no stock.');
            return;
        }

        const existing = cart.find(i => i.id === id);
        if (existing) {
            if (existing.quantity >= available) {
                showToast('Max stock', 'Cannot add more than ' + available + ' (in stock).');
                return;
            }
            existing.quantity += 1;
        } else {
            cart.push({
                id: product.id,
                name: product.name,
                price: parseFloat(product.retail_price),
                quantity: 1
            });
        }
        renderCart();
    }; // Attached to window for inline onclick

    window.updateQty = (index, delta) => {
        const product = allProducts.find(p => p.id === cart[index].id);
        const available = product ? (parseInt(product.quantity, 10) || 0) : 0;
        const newQty = cart[index].quantity + delta;
        if (newQty <= 0) {
            removeFromCart(index);
            return;
        }
        if (newQty > available) {
            showToast('Max stock', 'Cannot add more than ' + available + ' (in stock).');
            return;
        }
        cart[index].quantity = newQty;
        renderCart();
    };

    window.removeFromCart = (index) => {
        cart.splice(index, 1);
        renderCart();
    };

    // --- Filter ---
    document.getElementById('search-input').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allProducts.filter(p => {
            const nameMatch = p.name.toLowerCase().includes(term);
            const skuMatch = p.sku ? p.sku.toLowerCase().includes(term) : false;
            return nameMatch || skuMatch;
        });
        renderProducts(filtered);
    });

    document.getElementById('category-filter').addEventListener('change', (e) => {
        const catId = e.target.value;
        if (!catId) {
            renderProducts(allProducts);
            return;
        }
        const filtered = allProducts.filter(p => p.category == catId);
        renderProducts(filtered);
    });

    // --- Checkout ---
    document.getElementById('checkout-btn').addEventListener('click', async () => {
        if (cart.length === 0) return;

        const btn = document.getElementById('checkout-btn');
        btn.disabled = true;
        btn.innerText = 'Processing...';

        const customerId = document.getElementById('customer-select').value;

        const payload = {
            customer: customerId || null,
            items: cart.map(i => ({ item_id: i.id, quantity: i.quantity }))
        };

        try {
            const res = await fetch('/pos/api/sales/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                showToast('Success', 'Sale completed successfully!');
                cart = [];
                renderCart();
                // Refresh products to update stock? ideally yes, but for now just clear cart
                loadProducts();
            } else {
                const err = await res.json();
                showToast('Error', 'Sale failed: ' + JSON.stringify(err));
            }
        } catch (e) {
            showToast('Error', 'Network error');
        } finally {
            btn.disabled = false;
            btn.innerText = 'Checkout';
        }
    });

    function showToast(title, message) {
        document.getElementById('toast-title').innerText = title;
        document.getElementById('toast-body').innerText = message;
        const toastEl = document.getElementById('liveToast');
        const toast = new bootstrap.Toast(toastEl);
        toast.show();
    }

    // CSRF Helper
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>

<style>
    .product-card {
        cursor: pointer;
        transition: transform 0.1s;
    }

    .product-card:hover {
        transform: translateY(-2px);
        border-color: #0d6efd;
    }

    .product-card--out {
        opacity: 0.6;
        cursor: not-allowed;
    }

    .product-card--out:hover {
        transform: none;
        border-color: rgba(0, 0, 0, 0.125);
    }
</style>
{% endblock %}
