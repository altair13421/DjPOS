{% extends "base.html" %}

{% block title %}SALE PANEL{% endblock %}

{% block content %}
<div class="row h-100">
    <!-- Left: Product Grid -->
    <div class="col-md-8 d-flex flex-column h-100">
        <div class="mb-3 d-flex gap-2 flex-wrap">
            <input type="text" id="search-input" class="form-control" placeholder="Search products...">
            <select id="category-filter" class="form-select w-auto">
                <option value="">All Categories</option>
            </select>
            <div class="btn-group btn-group-sm" role="group">
                <input type="radio" class="btn-check" name="grid-mode" id="mode-products" value="products" checked>
                <label class="btn btn-outline-secondary" for="mode-products">Products</label>
                <input type="radio" class="btn-check" name="grid-mode" id="mode-bundles" value="bundles">
                <label class="btn btn-outline-secondary" for="mode-bundles">Bundles</label>
            </div>
        </div>

        <div id="product-grid" class="row row-cols-3 g-3 overflow-auto" style="max-height: 80vh;">
            <!-- Products populated by JS -->
            <div class="col text-center py-5">
                <div class="spinner-border"></div>
            </div>
        </div>
    </div>

    <!-- Right: Cart -->
    <div class="col-md-4 d-flex flex-column h-100 border-start bg-light p-3">
        <h4 class="d-flex justify-content-between align-items-center mb-3">
            <span>Current Sale</span>
        </h4>

        <!-- Customer Selection -->
        <div class="mb-3">
            <label class="form-label small text-muted">Customer</label>
            <select id="customer-select" class="form-select form-select-sm">
                <option value="">Walk-in Customer</option>
            </select>
        </div>

        <div id="cart-items" class="flex-grow-1 overflow-auto mb-3 border-top border-bottom bg-white p-2">
            <div class="text-center text-muted py-5">Cart is empty</div>
        </div>

        <div class="mt-auto">
            <div class="d-flex justify-content-between h5">
                <span>Total:</span>
                <span id="cart-total">PKR 0</span>
            </div>
            <button id="checkout-btn" class="btn btn-success w-100 btn-lg mt-3" disabled>
                Checkout
            </button>
        </div>
    </div>
</div>
<!-- Toast Container -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-header">
            <strong class="me-auto" id="toast-title">Notification</strong>
            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
        <div class="toast-body" id="toast-body">
            Action successful.
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const useWebPrint = {{ use_web_print|yesno:"true,false" }};
    let allProducts = [];
    let allBundles = []; // active bundles with .items[] { item, quantity, item_name, ... }
    let cart = []; // { type: 'item'|'bundle', id, name, price, quantity }
    let customers = [];

    document.addEventListener("DOMContentLoaded", async () => {
        await Promise.all([loadProducts(), loadBundles(), loadCategories(), loadCustomers()]);
        renderGrid();
    });

    // --- Data Loading ---
    async function loadProducts() {
        try {
            const res = await fetch('/inventory/api/items/');
            const data = await res.json();
            allProducts = Array.isArray(data) ? data : (data.results || []);
        } catch (e) {
            console.error("Error loading products:", e);
            document.getElementById('product-grid').innerHTML = '<div class="text-danger p-3">Failed to load products.</div>';
        }
    }

    async function loadBundles() {
        try {
            const res = await fetch('/inventory/api/bundles/');
            const data = await res.json();
            const list = Array.isArray(data) ? data : (data.results || []);
            allBundles = list.filter(b => b.active !== false);
        } catch (e) {
            console.error("Error loading bundles:", e);
        }
    }

    async function loadCategories() {
        try {
            const res = await fetch('/inventory/api/categories/');
            const data = await res.json();
            const categories = Array.isArray(data) ? data : (data.results || []);
            const select = document.getElementById('category-filter');
            categories.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.innerText = c.name;
                select.appendChild(opt);
            });
        } catch (e) { console.error("Error loading categories:", e); }
    }

    async function loadCustomers() {
        try {
            const res = await fetch('/pos/api/customers/');
            const data = await res.json();
            customers = data.results || data; // Handle pagination if needed
            const select = document.getElementById('customer-select');
            customers.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.innerText = c.name;
                select.appendChild(opt);
            });
        } catch (e) { console.error("Error loading customers", e); }
    }

    // --- Rendering ---
    function renderGrid() {
        const mode = document.querySelector('input[name="grid-mode"]:checked').value;
        if (mode === 'bundles') {
            renderBundles(allBundles);
        } else {
            const term = document.getElementById('search-input').value.toLowerCase();
            const catId = document.getElementById('category-filter').value;
            let products = allProducts;
            if (term) products = products.filter(p =>
                (p.name || '').toLowerCase().includes(term) || (p.sku || '').toLowerCase().includes(term));
            if (catId) products = products.filter(p => p.category == catId);
            renderProducts(products);
        }
    }

    function renderProducts(products) {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = '';

        if (products.length === 0) {
            grid.innerHTML = '<div class="col-12 text-center text-muted py-5">No products found</div>';
            return;
        }

        products.forEach(p => {
            const col = document.createElement('div');
            col.className = 'col';
            const inStock = parseInt(p.quantity, 10) || 0;
            const outOfStock = inStock <= 0;
            const cardClass = outOfStock ? 'card h-100 shadow-sm product-card product-card--out' : 'card h-100 shadow-sm product-card';
            col.innerHTML = `
            <div class="${cardClass}" data-product-id="${p.id}" data-type="item">
                <div class="card-body">
                    <h6 class="card-title text-truncate">${(p.name || '').replace(/</g, '&lt;')}</h6>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                         <span class="badge bg-secondary">${(p.sku || '').replace(/</g, '&lt;')}</span>
                         <span class="fw-bold text-primary">PKR ${Math.round(parseFloat(p.retail_price || 0))}</span>
                    </div>
                    <div class="small mt-1 text-muted">In stock: ${inStock}</div>
                </div>
            </div>
        `;
            col.querySelector('.card').onclick = () => addToCart(p.id);
            grid.appendChild(col);
        });
    }

    function renderBundles(bundles) {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = '';
        const term = document.getElementById('search-input').value.toLowerCase();
        if (term) bundles = bundles.filter(b => (b.name || '').toLowerCase().includes(term));
        if (bundles.length === 0) {
            grid.innerHTML = '<div class="col-12 text-center text-muted py-5">No active bundles.</div>';
            return;
        }
        bundles.forEach(b => {
            const col = document.createElement('div');
            col.className = 'col';
            const canAdd = canAddBundle(b.id, 1);
            const cardClass = !canAdd ? 'card h-100 shadow-sm product-card product-card--out' : 'card h-100 shadow-sm product-card';
            col.innerHTML = `
            <div class="${cardClass}" data-bundle-id="${b.id}" data-type="bundle">
                <div class="card-body">
                    <h6 class="card-title text-truncate">${(b.name || '').replace(/</g, '&lt;')}</h6>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                         <span class="badge bg-info">Bundle</span>
                         <span class="fw-bold text-primary">PKR ${Math.round(parseFloat(b.price || 0))}</span>
                    </div>
                    <div class="small mt-1 text-muted">${canAdd ? 'In stock' : 'Insufficient component stock'}</div>
                </div>
            </div>
        `;
            col.querySelector('.card').onclick = () => addBundleToCart(b.id);
            grid.appendChild(col);
        });
    }

    function canAddBundle(bundleId, extraQty) {
        const bundle = allBundles.find(b => b.id === bundleId);
        if (!bundle || !bundle.items || !bundle.items.length) return false;
        const cartQty = cart.filter(c => c.type === 'bundle' && c.id === bundleId).reduce((s, c) => s + c.quantity, 0);
        const needQty = cartQty + extraQty;
        for (const bi of bundle.items) {
            const itemId = bi.item;
            const need = (bi.quantity || 1) * needQty;
            const product = allProducts.find(p => p.id === itemId);
            const available = product ? (parseInt(product.quantity, 10) || 0) : 0;
            if (available < need) return false;
        }
        return true;
    }

    function renderCart() {
        const container = document.getElementById('cart-items');
        container.innerHTML = '';
        let total = 0;

        if (cart.length === 0) {
            container.innerHTML = '<div class="text-center text-muted py-5">Cart is empty</div>';
            document.getElementById('checkout-btn').disabled = true;
            document.getElementById('cart-total').innerText = 'PKR 0';
            return;
        }

        cart.forEach((entry, index) => {
            const lineTotal = entry.price * entry.quantity;
            total += lineTotal;
            const label = entry.type === 'bundle' ? 'Bundle' : '';
            const el = document.createElement('div');
            el.className = 'd-flex justify-content-between align-items-center mb-2 p-2 border-bottom';
            el.innerHTML = `
            <div>
                <div class="fw-bold">${(entry.name || '').replace(/</g, '&lt;')}${label ? ' <span class="badge bg-info">' + label + '</span>' : ''}</div>
                <div class="small text-muted">PKR ${Math.round(parseFloat(entry.price))} x ${entry.quantity}</div>
            </div>
            <div class="text-end">
                <div class="fw-bold">PKR ${Math.round(lineTotal)}</div>
                <div class="btn-group btn-group-sm mt-1">
                     <button type="button" class="btn btn-outline-secondary" data-index="${index}" data-delta="-1">-</button>
                     <button type="button" class="btn btn-outline-danger" data-index="${index}" data-remove>×</button>
                </div>
            </div>
        `;
            el.querySelector('[data-delta="-1"]').onclick = () => updateQty(index, -1);
            el.querySelector('[data-remove]').onclick = () => removeFromCart(index);
            container.appendChild(el);
        });

        document.getElementById('cart-total').innerText = 'PKR ' + Math.round(total);
        document.getElementById('checkout-btn').disabled = false;
    }

    // --- Interaction ---
    window.addToCart = (id) => {
        const product = allProducts.find(p => p.id === id);
        if (!product) return;
        const available = parseInt(product.quantity, 10) || 0;
        if (available <= 0) {
            showToast('Out of stock', (product.name || 'Item') + ' has no stock.');
            return;
        }
        const existing = cart.find(c => c.type === 'item' && c.id === id);
        if (existing) {
            if (existing.quantity >= available) {
                showToast('Max stock', 'Cannot add more than ' + available + ' (in stock).');
                return;
            }
            existing.quantity += 1;
        } else {
            cart.push({
                type: 'item',
                id: product.id,
                name: product.name,
                price: parseFloat(product.retail_price || 0),
                quantity: 1
            });
        }
        renderCart();
    };

    window.addBundleToCart = (bundleId) => {
        const bundle = allBundles.find(b => b.id === bundleId);
        if (!bundle) return;
        if (!canAddBundle(bundleId, 1)) {
            showToast('Insufficient stock', 'Not enough component stock for this bundle.');
            return;
        }
        const existing = cart.find(c => c.type === 'bundle' && c.id === bundleId);
        if (existing) {
            if (!canAddBundle(bundleId, existing.quantity + 1 - existing.quantity)) {
                showToast('Insufficient stock', 'Cannot add more of this bundle.');
                return;
            }
            existing.quantity += 1;
        } else {
            cart.push({
                type: 'bundle',
                id: bundle.id,
                name: bundle.name,
                price: parseFloat(bundle.price || 0),
                quantity: 1
            });
        }
        renderCart();
    };

    window.updateQty = (index, delta) => {
        const entry = cart[index];
        const newQty = entry.quantity + delta;
        if (newQty <= 0) {
            removeFromCart(index);
            return;
        }
        if (entry.type === 'item') {
            const product = allProducts.find(p => p.id === entry.id);
            const available = product ? (parseInt(product.quantity, 10) || 0) : 0;
            if (newQty > available) {
                showToast('Max stock', 'Cannot add more than ' + available + ' (in stock).');
                return;
            }
        } else {
            if (!canAddBundle(entry.id, newQty)) {
                showToast('Insufficient stock', 'Cannot add more of this bundle.');
                return;
            }
        }
        entry.quantity = newQty;
        renderCart();
    };

    window.removeFromCart = (index) => {
        cart.splice(index, 1);
        renderCart();
    };

    // --- Filter & Mode ---
    document.getElementById('search-input').addEventListener('input', () => renderGrid());
    document.getElementById('category-filter').addEventListener('change', () => renderGrid());
    document.querySelectorAll('input[name="grid-mode"]').forEach(radio => {
        radio.addEventListener('change', () => renderGrid());
    });

    // --- Checkout ---
    document.getElementById('checkout-btn').addEventListener('click', async () => {
        if (cart.length === 0) return;

        const btn = document.getElementById('checkout-btn');
        btn.disabled = true;
        btn.innerText = 'Processing...';

        const customerId = document.getElementById('customer-select').value;

        const payload = {
            customer: customerId || null,
            items: cart.map(i => {
                if (i.type === 'bundle') return { bundle_id: i.id, quantity: i.quantity };
                return { item_id: i.id, quantity: i.quantity };
            })
        };

        try {
            const res = await fetch('/pos/api/sales/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                const data = await res.json();
                const saleId = data && data.id;
                showToast('Success', 'Sale completed successfully!');
                cart = [];
                renderCart();
                if (saleId) {
                    if (useWebPrint) {
                        window.open('/pos/sale/' + saleId + '/receipt/?auto=1', '_blank');
                    } else {
                        try {
                            const printRes = await fetch('/pos/api/sales/' + saleId + '/print_receipt/', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'X-CSRFToken': getCookie('csrftoken')
                                }
                            });
                            const printData = await printRes.json();
                            if (printRes.ok) {
                                showToast('Receipt', 'Receipt sent to printer.');
                            } else {
                                showToast('Print', 'Print failed: ' + (printData.error || printRes.statusText));
                            }
                        } catch (e) {
                            showToast('Print', 'Could not send to printer.');
                        }
                    }
                }
                setTimeout(() => location.reload(), 1200);
            } else {
                const err = await res.json();
                showToast('Error', 'Sale failed: ' + JSON.stringify(err));
            }
        } catch (e) {
            showToast('Error', 'Network error');
        } finally {
            btn.disabled = false;
            btn.innerText = 'Checkout';
        }
    });

    function showToast(title, message) {
        document.getElementById('toast-title').innerText = title;
        document.getElementById('toast-body').innerText = message;
        const toastEl = document.getElementById('liveToast');
        const toast = new bootstrap.Toast(toastEl);
        toast.show();
    }

    // CSRF Helper
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>

<style>
    .product-card {
        cursor: pointer;
        transition: transform 0.1s;
    }

    .product-card:hover {
        transform: translateY(-2px);
        border-color: #0d6efd;
    }

    .product-card--out {
        opacity: 0.6;
        cursor: not-allowed;
    }

    .product-card--out:hover {
        transform: none;
        border-color: rgba(0, 0, 0, 0.125);
    }
</style>
{% endblock %}
