services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ospos
      POSTGRES_USER: ospos
      POSTGRES_PASSWORD: ospos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ospos"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python3 manage.py migrate --noinput &&
             python3 manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ospos
      POSTGRES_USER: ospos
      POSTGRES_PASSWORD: ospos
      DEBUG: "True"
      DJANGO_SECRET_KEY: change-me-in-production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
